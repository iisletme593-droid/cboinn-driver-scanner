name: scanner-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse, XAML and build checks
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Test-Scanner.ps1

